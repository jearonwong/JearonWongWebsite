<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MAS is not agent count. MAS is lifecycle responsibility separation.</title>
  <desc id="desc">A structural comparison between industry multi-agent AI defined by more agents and accountable MAS defined by lifecycle responsibility separation.</desc>
  <defs>
    <style>
      .bg { fill: #111111; }
      .grid-line { stroke: rgba(241,245,249,0.055); stroke-width: 1; }
      .frame { fill: rgba(255,255,255,0.018); stroke: rgba(241,245,249,0.13); stroke-width: 1.4; }
      .frame-strong { fill: rgba(34,211,238,0.035); stroke: rgba(34,211,238,0.48); stroke-width: 1.6; }
      .rule { stroke: rgba(241,245,249,0.16); stroke-width: 1; }
      .weak-line { stroke: rgba(148,163,184,0.34); stroke-width: 2; fill: none; }
      .strong-line { stroke: rgba(34,211,238,0.88); stroke-width: 2.4; fill: none; }
      .boundary-line { stroke: rgba(59,130,246,0.72); stroke-width: 2; fill: none; stroke-dasharray: 10 8; }
      .label { fill: #22d3ee; font-family: "JetBrains Mono", Menlo, monospace; font-size: 20px; font-weight: 700; letter-spacing: 1.4px; }
      .label-blue { fill: #3b82f6; font-family: "JetBrains Mono", Menlo, monospace; font-size: 18px; font-weight: 700; letter-spacing: 1.3px; }
      .label-muted { fill: #94a3b8; font-family: "JetBrains Mono", Menlo, monospace; font-size: 16px; font-weight: 700; letter-spacing: 1.2px; }
      .title { fill: #f8fafc; font-family: "Outfit", Inter, sans-serif; font-size: 50px; font-weight: 800; letter-spacing: -0.5px; }
      .panel-title { fill: #f1f5f9; font-family: "Outfit", Inter, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -0.3px; }
      .panel-sub { fill: #94a3b8; font-family: Inter, sans-serif; font-size: 18px; font-weight: 500; }
      .node { fill: rgba(255,255,255,0.05); stroke: rgba(241,245,249,0.18); stroke-width: 1.2; }
      .node-weak { fill: rgba(148,163,184,0.065); stroke: rgba(148,163,184,0.24); stroke-width: 1.2; }
      .node-strong { fill: rgba(34,211,238,0.08); stroke: rgba(34,211,238,0.42); stroke-width: 1.2; }
      .text { fill: #e2e8f0; font-family: Inter, sans-serif; font-size: 21px; font-weight: 600; }
      .small { fill: #94a3b8; font-family: Inter, sans-serif; font-size: 16px; font-weight: 500; }
      .mono-small { fill: #cbd5e1; font-family: "JetBrains Mono", Menlo, monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.7px; }
      .footer { fill: #64748b; font-family: "JetBrains Mono", Menlo, monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.8px; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line"/>
    </pattern>
    <marker id="arrowWeak" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M 0 0 L 11 4 L 0 8 z" fill="#64748b" opacity="0.55"/>
    </marker>
    <marker id="arrowStrong" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M 0 0 L 11 4 L 0 8 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="48" y="48" width="1504" height="804" fill="none" stroke="rgba(241,245,249,0.13)" stroke-width="1"/>
  <text x="80" y="100" class="label">DEFINE THE AI AGENT LIFECYCLE / ESSAY 02</text>
  <text x="80" y="158" class="title">MAS is not agent count.</text>
  <text x="80" y="204" class="title" fill="#22d3ee">MAS is lifecycle responsibility separation.</text>
  <line x1="80" y1="236" x2="1520" y2="236" class="rule"/>

  <g transform="translate(80 280)">
    <rect width="670" height="470" rx="2" class="frame"/>
    <text x="34" y="54" class="label-muted">INDUSTRY MAS</text>
    <text x="34" y="96" class="panel-title">More agents, more workflow</text>
    <text x="34" y="128" class="panel-sub">Defined by agent count, role count, and coordination complexity.</text>

    <path d="M166 188 C260 125, 390 128, 495 188" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M506 210 C420 284, 278 284, 166 210" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M176 321 C300 220, 472 230, 520 344" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M526 321 C400 382, 244 380, 146 344" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M300 180 L242 320" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M390 180 L426 320" class="weak-line" marker-end="url(#arrowWeak)"/>
    <path d="M242 346 L426 346" class="weak-line" marker-end="url(#arrowWeak)"/>

    <rect x="76" y="166" width="148" height="52" rx="2" class="node-weak"/>
    <text x="102" y="198" class="mono-small">PM Agent</text>
    <rect x="262" y="142" width="168" height="52" rx="2" class="node-weak"/>
    <text x="286" y="174" class="mono-small">Architect Agent</text>
    <rect x="470" y="166" width="158" height="52" rx="2" class="node-weak"/>
    <text x="494" y="198" class="mono-small">Developer Agent</text>
    <rect x="150" y="318" width="174" height="52" rx="2" class="node-weak"/>
    <text x="175" y="350" class="mono-small">Reviewer Agent</text>
    <rect x="404" y="318" width="134" height="52" rx="2" class="node-weak"/>
    <text x="436" y="350" class="mono-small">QA Agent</text>

    <g transform="translate(52 390)">
      <text x="0" y="0" class="label-muted">VISIBLE SIGNALS</text>
      <text x="0" y="34" class="small">Agent count / role labels / branches / coordination</text>
      <text x="0" y="64" class="small" fill="#64748b">Execution coordination without accountability structure</text>
    </g>
  </g>

  <g transform="translate(850 280)">
    <rect width="670" height="470" rx="2" class="frame-strong"/>
    <text x="34" y="54" class="label">ACCOUNTABLE MAS</text>
    <text x="34" y="96" class="panel-title">Separated lifecycle responsibilities</text>
    <text x="34" y="128" class="panel-sub">Role names remain, but protocol boundaries define responsibility.</text>

    <rect x="54" y="164" width="562" height="54" rx="2" class="node"/>
    <text x="78" y="198" class="label-muted">AGENT ROLE SURFACE</text>
    <text x="314" y="198" class="small">PM / Architect / Dev / Reviewer / QA</text>

    <path d="M94 248 H576" class="boundary-line"/>
    <text x="54" y="266" class="label-blue">LIFECYCLE RESPONSIBILITY BOUNDARIES</text>

    <g transform="translate(54 294)">
      <rect width="146" height="58" rx="2" class="node-strong"/>
      <text x="24" y="36" class="mono-small">Context</text>
      <rect x="170" width="116" height="58" rx="2" class="node-strong"/>
      <text x="204" y="36" class="mono-small">Plan</text>
      <rect x="310" width="122" height="58" rx="2" class="node-strong"/>
      <text x="334" y="36" class="mono-small">Confirm</text>
      <rect x="456" width="112" height="58" rx="2" class="node-strong"/>
      <text x="486" y="36" class="mono-small">Trace</text>
    </g>

    <g transform="translate(54 372)">
      <rect width="196" height="58" rx="2" class="node"/>
      <text x="24" y="36" class="mono-small">Review Boundary</text>
      <rect x="218" width="172" height="58" rx="2" class="node"/>
      <text x="242" y="36" class="mono-small">Rollback Point</text>
      <rect x="408" width="174" height="58" rx="2" class="node"/>
      <text x="432" y="36" class="mono-small">Delivery State</text>
    </g>

    <text x="54" y="456" class="small">Accountability emerges from separated boundaries, not from adding agents.</text>
  </g>

  <g transform="translate(80 812)">
    <text x="0" y="0" class="label">More agents do not make MAS. Separated lifecycle responsibilities do.</text>
    <text x="0" y="36" class="footer">Jearon Wong / Define The AI Agent Lifecycle / www.jearonwong.com</text>
  </g>
</svg>
