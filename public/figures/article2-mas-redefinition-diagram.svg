<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">More agents do not make MAS</title>
  <desc id="desc">A governed editorial-tech diagram contrasting industry MAS based on agent count with accountable MAS based on lifecycle responsibility separation.</desc>
  <defs>
    <style>
      .bg { fill: #111111; }
      .grid { stroke: rgba(241,245,249,0.05); stroke-width: 1; }
      .outer { fill: none; stroke: rgba(241,245,249,0.16); stroke-width: 1.2; }
      .panel { fill: rgba(255,255,255,0.025); stroke: rgba(241,245,249,0.16); stroke-width: 1.5; }
      .panel-hot { fill: rgba(34,211,238,0.045); stroke: rgba(34,211,238,0.56); stroke-width: 1.8; }
      .line { stroke: rgba(100,116,139,0.38); stroke-width: 2; fill: none; }
      .line-hot { stroke: rgba(34,211,238,0.82); stroke-width: 2.4; fill: none; }
      .boundary { stroke: rgba(59,130,246,0.68); stroke-width: 2.2; stroke-dasharray: 12 10; fill: none; }
      .kicker { fill: #22d3ee; font: 700 20px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.6px; }
      .label { fill: #64748b; font: 700 19px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.25px; }
      .label-hot { fill: #22d3ee; font: 700 19px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.25px; }
      .title { fill: #f1f5f9; font: 820 66px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .title-hot { fill: #22d3ee; font: 820 46px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .panel-title { fill: #f1f5f9; font: 800 42px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .panel-sub { fill: #f1f5f9; font: 600 24px Inter, sans-serif; letter-spacing: 0; }
      .node { fill: rgba(255,255,255,0.07); stroke: rgba(241,245,249,0.22); stroke-width: 1.2; }
      .node-muted { fill: rgba(100,116,139,0.08); stroke: rgba(100,116,139,0.28); stroke-width: 1.2; }
      .node-hot { fill: rgba(34,211,238,0.12); stroke: rgba(34,211,238,0.55); stroke-width: 1.3; }
      .node-blue { fill: rgba(59,130,246,0.13); stroke: rgba(59,130,246,0.52); stroke-width: 1.3; }
      .text { fill: #f1f5f9; font: 760 28px Inter, sans-serif; letter-spacing: 0; }
      .text-hot { fill: #f1f5f9; font: 780 30px Inter, sans-serif; letter-spacing: 0; }
      .small { fill: #64748b; font: 560 21px Inter, sans-serif; letter-spacing: 0; }
      .mono { fill: #f1f5f9; font: 760 22px "JetBrains Mono", Menlo, monospace; letter-spacing: 0.4px; }
      .footer { fill: #64748b; font: 700 17px "JetBrains Mono", Menlo, monospace; letter-spacing: 0.8px; }
    </style>
    <pattern id="registry-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid" fill="none"/>
    </pattern>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#64748b" opacity="0.72"/>
    </marker>
    <marker id="arrowHot" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#registry-grid)"/>
  <rect x="52" y="48" width="1496" height="804" class="outer"/>

  <text x="82" y="104" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 02</text>
  <text x="82" y="178" class="title">More agents do not make MAS.</text>
  <text x="82" y="232" class="title-hot">Separated lifecycle responsibilities do.</text>

  <g transform="translate(82 282)">
    <rect width="675" height="470" rx="2" class="panel"/>
    <text x="40" y="62" class="label">INDUSTRY MAS</text>
    <text x="40" y="118" class="panel-title">Agent count as system</text>
    <text x="40" y="156" class="panel-sub">More roles. More branches. Still unclear ownership.</text>

    <path d="M224 253 H250" class="line" marker-end="url(#arrow)"/>
    <path d="M426 253 H452" class="line" marker-end="url(#arrow)"/>
    <path d="M326 371 H356" class="line" marker-end="url(#arrow)"/>

    <rect x="48" y="220" width="176" height="66" rx="2" class="node-muted"/>
    <text x="84" y="262" class="mono">PM Agent</text>
    <rect x="250" y="220" width="176" height="66" rx="2" class="node-muted"/>
    <text x="278" y="262" class="mono">Dev Agent</text>
    <rect x="452" y="220" width="176" height="66" rx="2" class="node-muted"/>
    <text x="486" y="262" class="mono">QA Agent</text>
    <rect x="148" y="338" width="178" height="66" rx="2" class="node-muted"/>
    <text x="176" y="380" class="mono">Architect</text>
    <rect x="356" y="338" width="178" height="66" rx="2" class="node-muted"/>
    <text x="384" y="380" class="mono">Reviewer</text>

    <g transform="translate(40 428)">
      <text x="0" y="0" class="small">Agent Count / Role Labels / Workflow Complexity</text>
    </g>
  </g>

  <g transform="translate(843 282)">
    <rect width="675" height="470" rx="2" class="panel-hot"/>
    <text x="40" y="62" class="label-hot">ACCOUNTABLE MAS</text>
    <text x="40" y="118" class="panel-title">Responsibility as system</text>
    <text x="40" y="156" class="panel-sub">Role surfaces are bound to lifecycle boundaries.</text>

    <rect x="48" y="202" width="579" height="72" rx="2" class="node"/>
    <text x="80" y="247" class="text">PM / Architect / Developer / Reviewer / QA</text>

    <path d="M88 314 H588" class="boundary"/>
    <text x="48" y="338" class="label">LIFECYCLE RESPONSIBILITY SEPARATION</text>

    <rect x="48" y="354" width="150" height="62" rx="2" class="node-hot"/>
    <text x="74" y="394" class="text-hot">Confirm</text>
    <rect x="240" y="354" width="150" height="62" rx="2" class="node-blue"/>
    <text x="284" y="394" class="text-hot">Trace</text>
    <rect x="432" y="354" width="150" height="62" rx="2" class="node-hot"/>
    <text x="460" y="394" class="text-hot">Delivery</text>

    <rect x="198" y="426" width="278" height="40" rx="2" class="node"/>
    <text x="250" y="454" class="mono">Rollback-aware</text>
  </g>

  <text x="82" y="818" class="kicker">MAS is not agent count. MAS is lifecycle responsibility separation.</text>
  <text x="82" y="850" class="footer">Jearon Wong / Define The AI Agent Lifecycle / www.jearonwong.com</text>
</svg>
