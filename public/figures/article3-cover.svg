<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="c3title c3desc">
  <title id="c3title">Agent Orchestration Is Not Delivery</title>
  <desc id="c3desc">A dark editorial cover for the third Define The AI Agent Lifecycle essay by Jearon Wong.</desc>
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="edge3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.36"/>
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#111111"/>
  <rect width="1200" height="630" fill="url(#grid3)"/>
  <rect x="36" y="36" width="1128" height="558" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="56" y="56" width="1088" height="518" fill="none" stroke="url(#edge3)" stroke-width="1"/>

  <!-- Series header -->
  <g transform="translate(84 78)">
    <text x="0" y="0" fill="#22d3ee" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="2">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
    <line x1="0" y1="24" x2="1030" y2="24" stroke="#ffffff" stroke-opacity="0.1"/>
  </g>

  <!-- Title -->
  <g transform="translate(84 166)">
    <text fill="#f1f5f9" font-family="Outfit, Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-0.5">
      <tspan x="0" y="0">Agent Orchestration</tspan>
      <tspan x="0" y="82">Is Not Delivery</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(84 380)">
    <text x="0" y="0" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="0">
      <tspan x="0" dy="0">The orchestrator is not the router of agents.</tspan>
      <tspan x="0" dy="34">It is the consensus layer.</tspan>
    </text>
    <text x="0" y="100" fill="#f1f5f9" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="1.2">BY JEARON WONG</text>
  </g>

  <!-- Concept box -->
  <g transform="translate(738 100)">
    <rect x="0" y="0" width="362" height="110" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.28" stroke-width="1"/>
    <text x="20" y="32" fill="#22d3ee" font-family="JetBrains Mono, Menlo, monospace" font-size="13" font-weight="700" letter-spacing="1.4">LIFECYCLE RESPONSIBILITY CONSENSUS</text>
    <line x1="20" y1="44" x2="342" y2="44" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
    <text x="20" y="66" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400">Human Intent → Role Authority</text>
    <text x="20" y="86" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400">Agent Execution → Evidence → Accepted</text>
  </g>

  <!-- Bottom rule with dots -->
  <g transform="translate(84 572)">
    <line x1="0" y1="0" x2="1030" y2="0" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="0"   cy="0" r="4" fill="#22d3ee"/>
    <circle cx="257" cy="0" r="4" fill="#3b82f6"/>
    <circle cx="514" cy="0" r="4" fill="#22d3ee"/>
    <circle cx="1030" cy="0" r="4" fill="#f1f5f9"/>
  </g>
</svg>
