<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="t1 d1">
  <title id="t1">Bidirectional Responsibility Mapping</title>
  <desc id="d1">Two chains held by the delivery-grade orchestrator: forward from human intent to accepted outcome, backward from accepted outcome to human intent.</desc>
  <defs>
    <style>
      .bg{fill:#111111}
      .outer{fill:none;stroke:rgba(241,245,249,0.16);stroke-width:1.2}
      .panel-orch{fill:rgba(34,211,238,0.04);stroke:rgba(34,211,238,0.44);stroke-width:1.8}
      .nc{fill:rgba(34,211,238,0.12);stroke:rgba(34,211,238,0.55);stroke-width:1.3}
      .nb{fill:rgba(59,130,246,0.13);stroke:rgba(59,130,246,0.52);stroke-width:1.3}
      .kicker{fill:#22d3ee;font:700 19px "JetBrains Mono",Menlo,monospace;letter-spacing:1.4px}
      .ttl{fill:#f1f5f9;font:820 54px "Outfit",Inter,sans-serif}
      .sub{fill:#22d3ee;font:700 28px "Outfit",Inter,sans-serif}
      .chl-c{fill:#22d3ee;font:700 15px "JetBrains Mono",Menlo,monospace;letter-spacing:1.1px}
      .chl-b{fill:#3b82f6;font:700 15px "JetBrains Mono",Menlo,monospace;letter-spacing:1.1px}
      .nt{fill:#f1f5f9;font:700 17px Inter,sans-serif}
      .orch-ttl{fill:#22d3ee;font:800 30px "Outfit",Inter,sans-serif}
      .orch-sub{fill:#94a3b8;font:500 18px Inter,sans-serif}
      .orch-note{fill:#475569;font:500 16px Inter,sans-serif}
      .dir-c{fill:#22d3ee;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:0.9px}
      .dir-b{fill:#3b82f6;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:0.9px}
      .footer{fill:#64748b;font:700 16px "JetBrains Mono",Menlo,monospace;letter-spacing:0.8px}
    </style>
    <pattern id="g1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(241,245,249,0.05)" stroke-width="1"/>
    </pattern>
    <marker id="aC" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#22d3ee" opacity="0.85"/>
    </marker>
    <marker id="aB" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#3b82f6" opacity="0.85"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect x="52" y="48" width="1496" height="804" class="outer"/>

  <!-- Header -->
  <text x="82" y="100" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
  <text x="82" y="162" class="ttl">Bidirectional Responsibility Mapping</text>
  <text x="82" y="206" class="sub">Two chains. One orchestrator. This is where delivery determinacy comes from.</text>

  <!-- Forward chain label -->
  <text x="82" y="248" class="chl-c">FORWARD  ↓  HUMAN INTENT → ACCEPTED OUTCOME</text>

  <!-- Forward chain nodes  x: 80 258 436 614 792 970 1148 1326  cy=293 -->
  <rect x="80"   y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="156"  y="283" text-anchor="middle" class="nt">Human</text>
  <text x="156"  y="304" text-anchor="middle" class="nt">Intent</text>

  <path d="M234 291 H256" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="258"  y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="334"  y="283" text-anchor="middle" class="nt">Human</text>
  <text x="334"  y="304" text-anchor="middle" class="nt">Role</text>

  <path d="M412 291 H434" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="436"  y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="512"  y="281" text-anchor="middle" class="nt">Lifecycle</text>
  <text x="512"  y="300" text-anchor="middle" style="fill:#f1f5f9;font:600 15px Inter,sans-serif">Responsibility</text>

  <path d="M590 291 H612" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="614"  y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="690"  y="283" text-anchor="middle" class="nt">Agent</text>
  <text x="690"  y="304" text-anchor="middle" class="nt">Role</text>

  <path d="M768 291 H790" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="792"  y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="868"  y="283" text-anchor="middle" class="nt">Verifiable</text>
  <text x="868"  y="304" text-anchor="middle" class="nt">Task</text>

  <path d="M946 291 H968" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="970"  y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="1046" y="295" text-anchor="middle" class="nt">Evidence</text>

  <path d="M1124 291 H1146" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="1148" y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="1224" y="295" text-anchor="middle" class="nt">Review</text>

  <path d="M1302 291 H1324" stroke="#22d3ee" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aC)"/>

  <rect x="1326" y="258" width="152" height="66" rx="2" class="nc"/>
  <text x="1402" y="281" text-anchor="middle" class="nt">Accepted</text>
  <text x="1402" y="302" text-anchor="middle" class="nt">Outcome</text>

  <!-- Dashes: forward nodes → orch band (y=324→y=364) -->
  <line x1="156"  y1="324" x2="156"  y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="334"  y1="324" x2="334"  y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="512"  y1="324" x2="512"  y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="690"  y1="324" x2="690"  y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="868"  y1="324" x2="868"  y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1046" y1="324" x2="1046" y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1224" y1="324" x2="1224" y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1402" y1="324" x2="1402" y2="364" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Orchestrator band y=364 h=200 -->
  <rect x="80" y="364" width="1398" height="200" rx="2" class="panel-orch"/>

  <text x="779" y="418" text-anchor="middle" class="orch-ttl">DELIVERY-GRADE ORCHESTRATOR</text>
  <text x="779" y="452" text-anchor="middle" class="orch-sub">Bidirectional Responsibility Mapping Layer</text>

  <line x1="180" y1="472" x2="1420" y2="472" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>

  <text x="370" y="496" text-anchor="middle" class="dir-c">GOVERNS FORWARD  ↓  Execution</text>
  <text x="779" y="496" text-anchor="middle" class="orch-note">Without both directions, delivery is not determinately accountable.</text>
  <text x="1210" y="496" text-anchor="middle" class="dir-b">GOVERNS BACKWARD  ↑  Traceability</text>

  <text x="779" y="526" text-anchor="middle" class="orch-note">Forward only: execution runs but responsibility cannot be assigned.  ·  Backward only: auditing is possible but execution cannot be governed.</text>

  <!-- Dashes: orch band → reverse nodes (y=564→y=604) -->
  <line x1="156"  y1="564" x2="156"  y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="334"  y1="564" x2="334"  y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="512"  y1="564" x2="512"  y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="690"  y1="564" x2="690"  y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="868"  y1="564" x2="868"  y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1046" y1="564" x2="1046" y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1224" y1="564" x2="1224" y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="1402" y1="564" x2="1402" y2="604" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Reverse chain label -->
  <text x="82" y="600" class="chl-b">BACKWARD  ↑  ACCEPTED OUTCOME → HUMAN INTENT  (TRACEABILITY CHAIN)</text>

  <!-- Reverse chain nodes  same x positions  cy=641 -->
  <rect x="80"   y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="156"  y="635" text-anchor="middle" class="nt">Human</text>
  <text x="156"  y="656" text-anchor="middle" class="nt">Intent</text>

  <!-- Reverse arrow 1→0: path goes right-to-left, M258→234, marker-end auto-rotates left -->
