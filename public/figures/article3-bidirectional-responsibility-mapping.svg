  <rect x="258"  y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="334"  y="635" text-anchor="middle" class="nt">Human</text>
  <text x="334"  y="656" text-anchor="middle" class="nt">Role</text>

  <path d="M434 643 H412" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="436"  y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="512"  y="633" text-anchor="middle" class="nt">Lifecycle</text>
  <text x="512"  y="652" text-anchor="middle" style="fill:#f1f5f9;font:600 15px Inter,sans-serif">Responsibility</text>

  <path d="M612 643 H590" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="614"  y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="690"  y="635" text-anchor="middle" class="nt">Agent</text>
  <text x="690"  y="656" text-anchor="middle" class="nt">Role</text>

  <path d="M790 643 H768" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="792"  y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="868"  y="635" text-anchor="middle" class="nt">Verifiable</text>
  <text x="868"  y="656" text-anchor="middle" class="nt">Task</text>

  <path d="M968 643 H946" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="970"  y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="1046" y="647" text-anchor="middle" class="nt">Evidence</text>

  <path d="M1146 643 H1124" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="1148" y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="1224" y="647" text-anchor="middle" class="nt">Review</text>

  <path d="M1324 643 H1302" stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.85" fill="none" marker-end="url(#aB)"/>

  <rect x="1326" y="610" width="152" height="66" rx="2" class="nb"/>
  <text x="1402" y="633" text-anchor="middle" class="nt">Accepted</text>
  <text x="1402" y="654" text-anchor="middle" class="nt">Outcome</text>

  <!-- Footer -->
  <text x="82" y="748" class="footer">Jearon Wong / Define The AI Agent Lifecycle / www.jearonwong.com</text>
