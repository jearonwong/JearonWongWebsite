<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Lifecycle: It Was Not Designed. It Grew.</title>
  <desc id="desc">A dark editorial cover for the first Define The AI Agent Lifecycle essay by Jearon Wong.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.34"/>
      <stop offset="0.46" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#111111"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="36" y="36" width="1128" height="558" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="56" y="56" width="1088" height="518" fill="none" stroke="url(#edge)" stroke-width="1"/>

  <g transform="translate(84 78)">
    <text x="0" y="0" fill="#22d3ee" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="2">DEFINE THE AI AGENT LIFECYCLE</text>
    <line x1="0" y1="24" x2="1030" y2="24" stroke="#ffffff" stroke-opacity="0.1"/>
  </g>

  <g transform="translate(84 166)">
    <text fill="#f1f5f9" font-family="Outfit, Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="0">
      <tspan x="0" y="0">AI Agent Lifecycle:</tspan>
      <tspan x="0" y="82">It Was Not Designed.</tspan>
      <tspan x="0" y="164">It Grew.</tspan>
    </text>
  </g>

  <g transform="translate(84 436)">
    <text x="0" y="0" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">
      From prompt failure to intent drift, a lifecycle definition grew out of engineering practice.
    </text>
    <text x="0" y="54" fill="#f1f5f9" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="1.2">BY JEARON WONG</text>
  </g>

  <g transform="translate(790 94)">
    <rect x="0" y="0" width="326" height="96" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="24" y="34" fill="#3b82f6" font-family="JetBrains Mono, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="1.4">NARRATIVE CHAIN</text>
    <text x="24" y="65" fill="#cbd5e1" font-family="JetBrains Mono, Menlo, monospace" font-size="15">Prompt -> Context -> Intent</text>
  </g>

  <g transform="translate(84 558)">
    <line x1="0" y1="0" x2="1030" y2="0" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="0" cy="0" r="4" fill="#3b82f6"/>
    <circle cx="257" cy="0" r="4" fill="#22d3ee"/>
    <circle cx="514" cy="0" r="4" fill="#f59e0b"/>
    <circle cx="1030" cy="0" r="4" fill="#f1f5f9"/>
  </g>
</svg>
