<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="t4 d4">
  <title id="t4">Human Role HITL vs Generic HITL</title>
  <desc id="d4">Left: Generic HITL as a human button. Right: Human Role Confirmation Boundary — each human role confirms a different lifecycle boundary and produces traceable downstream authorization.</desc>
  <defs>
    <style>
      .bg{fill:#111111}
      .outer{fill:none;stroke:rgba(241,245,249,0.16);stroke-width:1.2}
      .panel{fill:rgba(255,255,255,0.025);stroke:rgba(241,245,249,0.16);stroke-width:1.5}
      .panel-hot{fill:rgba(34,211,238,0.04);stroke:rgba(34,211,238,0.5);stroke-width:1.8}
      .node-m{fill:rgba(100,116,139,0.08);stroke:rgba(100,116,139,0.28);stroke-width:1.2}
      .node-c{fill:rgba(34,211,238,0.12);stroke:rgba(34,211,238,0.55);stroke-width:1.3}
      .node-b{fill:rgba(59,130,246,0.13);stroke:rgba(59,130,246,0.52);stroke-width:1.3}
      .node-ev{fill:rgba(34,211,238,0.07);stroke:rgba(34,211,238,0.35);stroke-width:1.2}
      .kicker{fill:#22d3ee;font:700 19px "JetBrains Mono",Menlo,monospace;letter-spacing:1.4px}
      .ttl{fill:#f1f5f9;font:820 54px "Outfit",Inter,sans-serif}
      .sub{fill:#22d3ee;font:700 28px "Outfit",Inter,sans-serif}
      .lbl{fill:#64748b;font:700 17px "JetBrains Mono",Menlo,monospace;letter-spacing:1.2px}
      .lbl-hot{fill:#22d3ee;font:700 17px "JetBrains Mono",Menlo,monospace;letter-spacing:1.2px}
      .ptitle{fill:#f1f5f9;font:800 30px "Outfit",Inter,sans-serif}
      .psub{fill:#94a3b8;font:500 17px Inter,sans-serif}
      .nt{fill:#f1f5f9;font:700 17px Inter,sans-serif}
      .nt-m{fill:#64748b;font:700 17px Inter,sans-serif}
      .nt-s{fill:#f1f5f9;font:600 14px Inter,sans-serif}
      .nt-xs{fill:#94a3b8;font:500 12px Inter,sans-serif}
      .verdict{fill:#64748b;font:560 18px Inter,sans-serif}
      .verdict-hot{fill:#22d3ee;font:700 18px Inter,sans-serif}
      .footer{fill:#64748b;font:700 16px "JetBrains Mono",Menlo,monospace;letter-spacing:0.8px}
    </style>
    <pattern id="g4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(241,245,249,0.05)" stroke-width="1"/>
    </pattern>
    <marker id="aM4" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#64748b" opacity="0.7"/>
    </marker>
    <marker id="aC4" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#g4)"/>
  <rect x="52" y="48" width="1496" height="804" class="outer"/>

  <!-- Header -->
  <text x="82" y="100" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
  <text x="82" y="162" class="ttl">HITL Is Not Governance Unless...</text>
  <text x="82" y="206" class="sub">The human must return through a role, a boundary, and evidence.</text>

  <!-- Divider -->
  <line x1="790" y1="234" x2="790" y2="838" stroke="rgba(241,245,249,0.1)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- ===== LEFT: Generic HITL ===== -->
  <rect x="82" y="234" width="688" height="584" rx="2" class="panel"/>
  <text x="122" y="274" class="lbl">GENERIC HITL</text>
  <text x="122" y="312" class="ptitle">A checkpoint. Not governance.</text>
  <text x="122" y="342" class="psub">Who approved? What boundary? What evidence? Unknown.</text>

  <!-- Simple flow: Agent Execution → [button] → Human → Continue -->
  <rect x="196" y="380" width="180" height="60" rx="2" class="node-m"/>
  <text x="286" y="415" text-anchor="middle" class="nt-m">Agent Execution</text>

  <path d="M378 410 H430" stroke="#64748b" stroke-width="2" stroke-opacity="0.7" fill="none" marker-end="url(#aM4)"/>

  <!-- Button diamond -->
  <polygon points="466,390 530,410 466,430 402,410" fill="rgba(100,116,139,0.12)" stroke="rgba(100,116,139,0.4)" stroke-width="1.5"/>
  <text x="466" y="415" text-anchor="middle" style="fill:#64748b;font:700 13px Inter,sans-serif">?</text>

  <path d="M532 410 H580" stroke="#64748b" stroke-width="2" stroke-opacity="0.7" fill="none" marker-end="url(#aM4)"/>

  <rect x="582" y="380" width="140" height="60" rx="2" class="node-m"/>
  <text x="652" y="415" text-anchor="middle" class="nt-m">Human</text>

  <path d="M376 410 L376 500" stroke="#64748b" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4 4" fill="none"/>
  <path d="M376 500 H560" stroke="#64748b" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4 4" fill="none" marker-end="url(#aM4)"/>

  <rect x="562" y="476" width="168" height="48" rx="2" class="node-m"/>
  <text x="646" y="505" text-anchor="middle" style="fill:#64748b;font:600 14px Inter,sans-serif">Continue / Reject</text>

  <!-- Problem annotations -->
  <line x1="122" y1="572" x2="750" y2="572" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="122" y="602" class="verdict">No role recorded. No boundary defined.</text>
  <text x="122" y="628" class="verdict">No evidence basis. No downstream authorization scope.</text>
  <text x="122" y="654" class="verdict">No traceability. Who approved? What did they approve?</text>
  <text x="122" y="690" class="verdict-hot">This is a human button. Not governance.</text>
  <text x="122" y="718" class="verdict">Governance requires: role · boundary · evidence · traceability.</text>
  <text x="122" y="744" style="fill:#475569;font:700 15px Inter,sans-serif">HITL is not governance unless the human returns through a role,</text>
  <text x="122" y="764" style="fill:#475569;font:700 15px Inter,sans-serif">a boundary, and evidence.</text>

  <!-- ===== RIGHT: Human Role HITL ===== -->
  <rect x="838" y="234" width="710" height="584" rx="2" class="panel-hot"/>
  <text x="878" y="274" class="lbl-hot">HUMAN ROLE CONFIRMATION BOUNDARY</text>
  <text x="878" y="312" class="ptitle">Role-specific governance.</text>
  <text x="878" y="342" class="psub">Each role confirms a different boundary and locks downstream authority.</text>

  <!-- Agent Execution box -->
  <rect x="1010" y="368" width="196" height="56" rx="2" class="node-m"/>
  <text x="1108" y="401" text-anchor="middle" class="nt">Agent Execution</text>

  <!-- Down arrow to lifecycle boundary -->
  <path d="M1108 424 L1108 452" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#aC4)"/>

  <!-- Lifecycle Boundary -->
  <rect x="958" y="454" width="300" height="48" rx="2" class="node-c"/>
  <text x="1108" y="483" text-anchor="middle" class="nt">Lifecycle Boundary</text>

  <!-- Fan out to 5 role boxes -->
  <path d="M1000 502 L900 552" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1040 502 L1000 552" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1108 502 L1108 552" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1176 502 L1216 552" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1216 502 L1324 552" stroke="rgba(34,211,238,0.5)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>

  <!-- 5 role confirmation boxes, y=554, width~104 -->
  <!-- Product, Architect, Security, QA, Operator -->
  <rect x="848"  y="554" width="104" height="68" rx="2" class="node-c"/>
  <text x="900"  y="577" text-anchor="middle" style="fill:#22d3ee;font:700 11px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.8px">PRODUCT</text>
  <text x="900"  y="596" text-anchor="middle" class="nt-s">Scope</text>
  <text x="900"  y="613" text-anchor="middle" class="nt-xs">Intent align</text>

  <rect x="964"  y="554" width="104" height="68" rx="2" class="node-c"/>
  <text x="1016" y="577" text-anchor="middle" style="fill:#22d3ee;font:700 11px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.8px">ARCHITECT</text>
  <text x="1016" y="596" text-anchor="middle" class="nt-s">Design</text>
  <text x="1016" y="613" text-anchor="middle" class="nt-xs">Boundary lock</text>

  <rect x="1056" y="554" width="104" height="68" rx="2" style="fill:rgba(239,68,68,0.1);stroke:rgba(239,68,68,0.5);stroke-width:1.3"/>
  <text x="1108" y="577" text-anchor="middle" style="fill:#f87171;font:700 11px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.8px">SECURITY</text>
  <text x="1108" y="596" text-anchor="middle" class="nt-s">Risk</text>
  <text x="1108" y="613" text-anchor="middle" class="nt-xs">Risk boundary</text>

  <rect x="1172" y="554" width="104" height="68" rx="2" class="node-b"/>
  <text x="1224" y="577" text-anchor="middle" style="fill:#60a5fa;font:700 11px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.8px">QA</text>
  <text x="1224" y="596" text-anchor="middle" class="nt-s">Acceptance</text>
  <text x="1224" y="613" text-anchor="middle" class="nt-xs">Test evidence</text>

  <rect x="1280" y="554" width="104" height="68" rx="2" class="node-b"/>
  <text x="1332" y="577" text-anchor="middle" style="fill:#60a5fa;font:700 11px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.8px">OPERATOR</text>
  <text x="1332" y="596" text-anchor="middle" class="nt-s">Deploy</text>
  <text x="1332" y="613" text-anchor="middle" class="nt-xs">Window confirm</text>

  <!-- Converge arrows to evidence + trace -->
  <path d="M900  622 L1000 672" stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1016 622 L1040 672" stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1108 622 L1108 672" stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1224 622 L1176 672" stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>
  <path d="M1332 622 L1216 672" stroke="rgba(34,211,238,0.4)" stroke-width="1.5" fill="none" marker-end="url(#aC4)"/>

  <!-- Evidence + Trace box -->
  <rect x="958" y="674" width="300" height="56" rx="2" class="node-ev"/>
  <text x="1108" y="700" text-anchor="middle" style="fill:#22d3ee;font:700 14px 'JetBrains Mono',Menlo,monospace;letter-spacing:0.9px">TRACE · EVIDENCE · DOWNSTREAM AUTH</text>
  <text x="1108" y="720" text-anchor="middle" class="nt-xs">Role · Boundary · Confirmation basis · What was authorized</text>

  <!-- Footer -->
  <text x="82" y="862" class="footer">Jearon Wong / Define The AI Agent Lifecycle / www.jearonwong.com</text>
</svg>
