<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Lifecycle-Governed Agent Workflow</title>
  <desc id="desc">A structural diagram showing human work models translated through Lifecycle Role Decomposition and Agent Lifecycle Protocol into lifecycle-governed agent workflow and accountable delivery.</desc>
  <defs>
    <style>
      .bg { fill: #111111; }
      .grid { stroke: rgba(241,245,249,0.05); stroke-width: 1; }
      .outer { fill: none; stroke: rgba(241,245,249,0.16); stroke-width: 1.2; }
      .panel { fill: rgba(255,255,255,0.026); stroke: rgba(241,245,249,0.16); stroke-width: 1.5; }
      .protocol { fill: rgba(34,211,238,0.06); stroke: rgba(34,211,238,0.62); stroke-width: 2; }
      .output { fill: rgba(59,130,246,0.055); stroke: rgba(59,130,246,0.48); stroke-width: 1.7; }
      .line { stroke: rgba(34,211,238,0.9); stroke-width: 3; fill: none; }
      .kicker { fill: #22d3ee; font: 700 20px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.5px; }
      .label { fill: #64748b; font: 700 18px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.2px; }
      .label-hot { fill: #22d3ee; font: 700 18px "JetBrains Mono", Menlo, monospace; letter-spacing: 1.2px; }
      .title { fill: #f1f5f9; font: 820 58px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .title-hot { fill: #22d3ee; font: 820 48px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .panel-title { fill: #f1f5f9; font: 800 36px "Outfit", Inter, sans-serif; letter-spacing: 0; }
      .panel-sub { fill: #f1f5f9; font: 600 22px Inter, sans-serif; letter-spacing: 0; }
      .node { fill: rgba(255,255,255,0.07); stroke: rgba(241,245,249,0.22); stroke-width: 1.2; }
      .node-blue { fill: rgba(59,130,246,0.13); stroke: rgba(59,130,246,0.52); stroke-width: 1.2; }
      .node-cyan { fill: rgba(34,211,238,0.12); stroke: rgba(34,211,238,0.55); stroke-width: 1.2; }
      .mono { fill: #f1f5f9; font: 760 23px "JetBrains Mono", Menlo, monospace; letter-spacing: 0.3px; }
      .text { fill: #f1f5f9; font: 740 25px Inter, sans-serif; letter-spacing: 0; }
      .small { fill: #64748b; font: 560 20px Inter, sans-serif; letter-spacing: 0; }
      .footer { fill: #64748b; font: 700 17px "JetBrains Mono", Menlo, monospace; letter-spacing: 0.8px; }
    </style>
    <pattern id="registry-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid" fill="none"/>
    </pattern>
    <marker id="arrowHot" markerWidth="14" markerHeight="11" refX="13" refY="5.5" orient="auto">
      <path d="M0,0 L14,5.5 L0,11 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#registry-grid)"/>
  <rect x="52" y="48" width="1496" height="804" class="outer"/>

  <text x="82" y="104" class="kicker">LIFECYCLE-GOVERNED AGENT WORKFLOW</text>
  <text x="82" y="172" class="title">Human work models in.</text>
  <text x="82" y="226" class="title-hot">Lifecycle-governed workflows out.</text>

  <g transform="translate(82 296)">
    <rect width="366" height="430" rx="2" class="panel"/>
    <text x="34" y="58" class="label">INPUT</text>
    <text x="34" y="108" class="panel-title">Human Work</text>
    <text x="34" y="150" class="panel-title">Model</text>
    <text x="34" y="186" class="panel-sub">How people describe work.</text>

    <rect x="34" y="224" width="298" height="54" rx="2" class="node"/>
    <text x="58" y="259" class="text">Requirements</text>
    <rect x="34" y="294" width="298" height="54" rx="2" class="node"/>
    <text x="58" y="329" class="text">Architecture</text>
    <rect x="34" y="364" width="298" height="54" rx="2" class="node"/>
    <text x="58" y="399" class="text">Development / QA</text>
  </g>

  <path d="M472 512 H535" class="line" marker-end="url(#arrowHot)"/>

  <g transform="translate(560 266)">
    <rect width="480" height="492" rx="2" class="protocol"/>
    <text x="36" y="60" class="label-hot">TRANSLATION LAYER</text>
    <text x="36" y="112" class="panel-title">Lifecycle Role</text>
    <text x="36" y="154" class="panel-title">Decomposition</text>
    <text x="36" y="190" class="panel-sub">Agent Lifecycle Protocol interprets</text>
    <text x="36" y="220" class="panel-sub">roles into governed boundaries.</text>

    <rect x="36" y="258" width="180" height="58" rx="2" class="node-cyan"/>
    <text x="72" y="295" class="mono">Context</text>
    <rect x="264" y="258" width="180" height="58" rx="2" class="node-blue"/>
    <text x="322" y="295" class="mono">Role</text>
    <rect x="36" y="336" width="180" height="58" rx="2" class="node-blue"/>
    <text x="86" y="373" class="mono">Plan</text>
    <rect x="264" y="336" width="180" height="58" rx="2" class="node-cyan"/>
    <text x="304" y="373" class="mono">Confirm</text>
    <rect x="36" y="414" width="180" height="58" rx="2" class="node-blue"/>
    <text x="82" y="451" class="mono">Trace</text>
    <rect x="264" y="414" width="180" height="58" rx="2" class="node-cyan"/>
    <text x="302" y="451" class="mono">Delivery</text>
  </g>

  <path d="M1065 512 H1128" class="line" marker-end="url(#arrowHot)"/>

  <g transform="translate(1152 296)">
    <rect width="366" height="430" rx="2" class="output"/>
    <text x="34" y="58" class="label">OUTPUT</text>
    <text x="34" y="108" class="panel-title">Governed Agent</text>
    <text x="34" y="150" class="panel-title">Workflow</text>
    <text x="34" y="186" class="panel-sub">Generated workflow with</text>
    <text x="34" y="216" class="panel-sub">accountability structure.</text>

    <rect x="34" y="224" width="298" height="54" rx="2" class="node-cyan"/>
    <text x="58" y="259" class="text">Confirm gates</text>
    <rect x="34" y="294" width="298" height="54" rx="2" class="node-blue"/>
    <text x="58" y="329" class="text">Trace obligations</text>
    <rect x="34" y="364" width="298" height="54" rx="2" class="node-cyan"/>
    <text x="58" y="399" class="text">Accountable delivery</text>
  </g>

  <text x="82" y="818" class="kicker">Not manual orchestration. Protocol-governed workflow generation.</text>
  <text x="82" y="850" class="footer">Jearon Wong / Define The AI Agent Lifecycle / Agent Lifecycle Protocol</text>
</svg>
