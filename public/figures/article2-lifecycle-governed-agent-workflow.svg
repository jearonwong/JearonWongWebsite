<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Lifecycle-Governed Agent Workflow</title>
  <desc id="desc">A three-layer diagram showing human work models interpreted through Lifecycle Role Decomposition and Agent Lifecycle Protocol into lifecycle-governed agent workflow.</desc>
  <defs>
    <style>
      .bg { fill: #111111; }
      .grid-line { stroke: rgba(241,245,249,0.055); stroke-width: 1; }
      .frame { fill: rgba(255,255,255,0.02); stroke: rgba(241,245,249,0.14); stroke-width: 1.4; }
      .frame-protocol { fill: rgba(59,130,246,0.08); stroke: rgba(34,211,238,0.58); stroke-width: 1.8; }
      .frame-output { fill: rgba(34,211,238,0.045); stroke: rgba(34,211,238,0.38); stroke-width: 1.5; }
      .rule { stroke: rgba(241,245,249,0.16); stroke-width: 1; }
      .line { stroke: rgba(148,163,184,0.46); stroke-width: 2; fill: none; }
      .line-strong { stroke: rgba(34,211,238,0.88); stroke-width: 2.5; fill: none; }
      .label { fill: #22d3ee; font-family: "JetBrains Mono", Menlo, monospace; font-size: 20px; font-weight: 700; letter-spacing: 1.4px; }
      .label-blue { fill: #3b82f6; font-family: "JetBrains Mono", Menlo, monospace; font-size: 18px; font-weight: 700; letter-spacing: 1.3px; }
      .label-muted { fill: #94a3b8; font-family: "JetBrains Mono", Menlo, monospace; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
      .title { fill: #f8fafc; font-family: "Outfit", Inter, sans-serif; font-size: 50px; font-weight: 800; letter-spacing: -0.5px; }
      .panel-title { fill: #f1f5f9; font-family: "Outfit", Inter, sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.2px; }
      .panel-sub { fill: #94a3b8; font-family: Inter, sans-serif; font-size: 17px; font-weight: 500; }
      .node { fill: rgba(255,255,255,0.048); stroke: rgba(241,245,249,0.16); stroke-width: 1.1; }
      .node-blue { fill: rgba(59,130,246,0.12); stroke: rgba(59,130,246,0.45); stroke-width: 1.1; }
      .node-cyan { fill: rgba(34,211,238,0.1); stroke: rgba(34,211,238,0.45); stroke-width: 1.1; }
      .text { fill: #e2e8f0; font-family: Inter, sans-serif; font-size: 18px; font-weight: 600; }
      .small { fill: #94a3b8; font-family: Inter, sans-serif; font-size: 15px; font-weight: 500; }
      .mono { fill: #cbd5e1; font-family: "JetBrains Mono", Menlo, monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.65px; }
      .footer { fill: #64748b; font-family: "JetBrains Mono", Menlo, monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.8px; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line"/>
    </pattern>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M 0 0 L 11 4 L 0 8 z" fill="#94a3b8" opacity="0.65"/>
    </marker>
    <marker id="arrowStrong" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M 0 0 L 11 4 L 0 8 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="48" y="48" width="1504" height="804" fill="none" stroke="rgba(241,245,249,0.13)" stroke-width="1"/>

  <text x="80" y="100" class="label">LIFECYCLE-GOVERNED AGENT WORKFLOW</text>
  <text x="80" y="158" class="title">Human work models in.</text>
  <text x="80" y="204" class="title" fill="#22d3ee">Lifecycle-governed workflows out.</text>
  <line x1="80" y1="236" x2="1520" y2="236" class="rule"/>

  <g transform="translate(80 290)">
    <rect width="390" height="430" rx="2" class="frame"/>
    <text x="28" y="48" class="label-muted">INPUT LAYER</text>
    <text x="28" y="88" class="panel-title">Human Work Model</text>
    <text x="28" y="118" class="panel-sub">How humans describe real work.</text>

    <g transform="translate(28 154)">
      <rect width="334" height="38" rx="2" class="node"/><text x="18" y="25" class="text">Product requirements</text>
      <rect y="50" width="334" height="38" rx="2" class="node"/><text x="18" y="75" class="text">Requirement review</text>
      <rect y="100" width="334" height="38" rx="2" class="node"/><text x="18" y="125" class="text">Architecture design</text>
      <rect y="150" width="334" height="38" rx="2" class="node"/><text x="18" y="175" class="text">Development</text>
      <rect y="200" width="334" height="38" rx="2" class="node"/><text x="18" y="225" class="text">QA and acceptance</text>
    </g>

    <text x="28" y="416" class="small">Familiar roles and stages, not a protocol yet.</text>
  </g>

  <path d="M500 500 H570" class="line-strong" marker-end="url(#arrowStrong)"/>

  <g transform="translate(590 270)">
    <rect width="420" height="470" rx="2" class="frame-protocol"/>
    <text x="30" y="52" class="label">PROTOCOL INTERPRETATION</text>
    <text x="30" y="92" class="panel-title">Lifecycle Role</text>
    <text x="30" y="128" class="panel-title">Decomposition</text>
    <text x="30" y="160" class="panel-sub">Human roles become lifecycle objects and boundaries.</text>

    <g transform="translate(30 190)">
      <rect width="160" height="48" rx="2" class="node-blue"/>
      <text x="26" y="31" class="mono">Context</text>
      <rect x="190" width="160" height="48" rx="2" class="node-blue"/>
      <text x="238" y="31" class="mono">Role</text>
      <rect y="64" width="160" height="48" rx="2" class="node-blue"/>
      <text x="52" y="95" class="mono">Plan</text>
      <rect x="190" y="64" width="160" height="48" rx="2" class="node-cyan"/>
      <text x="226" y="95" class="mono">Confirm</text>
      <rect y="128" width="160" height="48" rx="2" class="node-blue"/>
      <text x="52" y="159" class="mono">Trace</text>
      <rect x="190" y="128" width="160" height="48" rx="2" class="node-cyan"/>
      <text x="224" y="159" class="mono">Delivery</text>
    </g>

    <g transform="translate(30 388)">
      <text x="0" y="0" class="small">Interprets roles</text>
      <text x="0" y="28" class="small">Decomposes responsibility</text>
      <text x="0" y="56" class="small">Generates confirm gates</text>
      <text x="230" y="0" class="small">Assigns trace obligations</text>
      <text x="230" y="28" class="small">Preserves rollback points</text>
      <text x="230" y="56" class="small">Defines delivery states</text>
    </g>
  </g>

  <path d="M1030 500 H1100" class="line-strong" marker-end="url(#arrowStrong)"/>

  <g transform="translate(1130 290)">
    <rect width="390" height="450" rx="2" class="frame-output"/>
    <text x="28" y="48" class="label-muted">OUTPUT LAYER</text>
    <text x="28" y="88" class="panel-title">Lifecycle-Governed</text>
    <text x="28" y="124" class="panel-title">Agent Workflow</text>
    <text x="28" y="156" class="panel-sub">Generated workflow with accountability structure.</text>

    <g transform="translate(28 170)">
      <rect width="150" height="42" rx="2" class="node-cyan"/><text x="22" y="27" class="mono">PM Agent</text>
      <rect x="184" width="150" height="42" rx="2" class="node-cyan"/><text x="206" y="27" class="mono">Architect</text>
      <path d="M150 21 H184" class="line" marker-end="url(#arrow)"/>

      <rect y="70" width="150" height="42" rx="2" class="node-cyan"/><text x="20" y="97" class="mono">Developer</text>
      <rect x="184" y="70" width="150" height="42" rx="2" class="node-cyan"/><text x="212" y="97" class="mono">Reviewer</text>
      <path d="M150 91 H184" class="line" marker-end="url(#arrow)"/>

      <rect y="140" width="150" height="42" rx="2" class="node-cyan"/><text x="50" y="167" class="mono">QA</text>
      <rect x="184" y="140" width="150" height="42" rx="2" class="node-cyan"/><text x="204" y="167" class="mono">Human Confirm</text>
      <path d="M150 161 H184" class="line" marker-end="url(#arrow)"/>
    </g>

    <g transform="translate(28 374)">
      <text x="0" y="0" class="small">Confirm gates / trace obligations</text>
      <text x="0" y="28" class="small">Snapshots / rollback points</text>
      <text x="0" y="56" class="small">Delivery states / accountable handoff</text>
    </g>
  </g>

  <g transform="translate(80 802)">
    <text x="0" y="0" class="label">The future of agent workflow is not manual orchestration. It is lifecycle-governed generation.</text>
    <text x="0" y="36" class="footer">Jearon Wong / Define The AI Agent Lifecycle / Agent Lifecycle Protocol</text>
  </g>
</svg>
