<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">How AI Agent Lifecycle grew from engineering failure boundaries</title>
  <desc id="desc">A narrative chain from prompt constraints through intent drift and multi-agent amplification to AI Agent Lifecycle.</desc>
  <defs>
    <pattern id="smallGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#111111"/>
  <rect width="1280" height="720" fill="url(#smallGrid)"/>
  <rect x="48" y="48" width="1184" height="624" fill="none" stroke="#ffffff" stroke-opacity="0.11"/>

  <g transform="translate(84 96)">
    <text x="0" y="0" fill="#22d3ee" font-family="JetBrains Mono, Menlo, monospace" font-size="17" font-weight="700" letter-spacing="1.8">DEFINE THE AI AGENT LIFECYCLE / ESSAY 01</text>
    <text x="0" y="58" fill="#f1f5f9" font-family="Outfit, Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="0">The Lifecycle Grew From Failure Boundaries</text>
    <text x="0" y="96" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">The essay is a prelude: each break exposed the next governance need.</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)">
    <path d="M 250 286 H 356"/>
    <path d="M 526 286 H 632"/>
    <path d="M 806 286 H 912"/>
    <path d="M 1010 340 C 1010 398 922 422 866 422"/>
    <path d="M 696 422 H 590"/>
    <path d="M 420 422 H 314"/>
  </g>

  <g font-family="JetBrains Mono, Menlo, monospace">
    <g transform="translate(84 236)">
      <rect width="166" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#3b82f6" stroke-opacity="0.75"/>
      <text x="18" y="38" fill="#f1f5f9" font-size="16" font-weight="700">Prompt</text>
      <text x="18" y="64" fill="#cbd5e1" font-size="14">constraint</text>
    </g>

    <g transform="translate(360 236)">
      <rect width="166" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#3b82f6" stroke-opacity="0.52"/>
      <text x="18" y="38" fill="#f1f5f9" font-size="16" font-weight="700">Rule file</text>
      <text x="18" y="64" fill="#cbd5e1" font-size="14">expansion</text>
    </g>

    <g transform="translate(636 236)">
      <rect width="170" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#22d3ee" stroke-opacity="0.55"/>
      <text x="18" y="34" fill="#f1f5f9" font-size="16" font-weight="700">Context change</text>
      <text x="18" y="60" fill="#cbd5e1" font-size="14">and compression</text>
      <text x="18" y="82" fill="#cbd5e1" font-size="14">problem</text>
    </g>

    <g transform="translate(916 236)">
      <rect width="178" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#f59e0b" stroke-opacity="0.75"/>
      <text x="18" y="38" fill="#f1f5f9" font-size="16" font-weight="700">Intent</text>
      <text x="18" y="64" fill="#cbd5e1" font-size="14">drift</text>
    </g>

    <g transform="translate(700 372)">
      <rect width="166" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#22d3ee" stroke-opacity="0.72"/>
      <text x="18" y="34" fill="#f1f5f9" font-size="16" font-weight="700">Trace / confirm</text>
      <text x="18" y="60" fill="#cbd5e1" font-size="14">and rollback</text>
      <text x="18" y="82" fill="#cbd5e1" font-size="14">need</text>
    </g>

    <g transform="translate(424 372)">
      <rect width="166" height="100" fill="#ffffff" fill-opacity="0.045" stroke="#22d3ee" stroke-opacity="0.52"/>
      <text x="18" y="34" fill="#f1f5f9" font-size="16" font-weight="700">Multi-agent</text>
      <text x="18" y="60" fill="#cbd5e1" font-size="14">amplification</text>
    </g>

    <g transform="translate(112 372)">
      <rect width="202" height="100" fill="#22d3ee" fill-opacity="0.09" stroke="#22d3ee" stroke-opacity="0.95"/>
      <text x="18" y="38" fill="#f1f5f9" font-size="17" font-weight="700">AI Agent</text>
      <text x="18" y="66" fill="#f1f5f9" font-size="17" font-weight="700">Lifecycle</text>
    </g>
  </g>

  <g transform="translate(84 586)">
    <line x1="0" y1="0" x2="1112" y2="0" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="0" y="38" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">
      Not a four-layer architecture diagram. A memory aid for how the concept emerged.
    </text>
  </g>
</svg>
